kind = "web"
previewPath = "/"
title = "CYDigital"
version = "1.0.0"
id = "artifacts/cydigital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20702

[services.development]
run = "pnpm --filter @workspace/cydigital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cydigital", "run", "build" ]
publicDir = "artifacts/cydigital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20702"
BASE_PATH = "/"
